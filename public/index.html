<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatApp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- Login Screen -->
    <div id="login-screen" class="screen">
      <div class="login-box">
        <h1>ChatApp</h1>
        <p>enter a username to connect</p>
        <input
          type="text"
          id="username-input"
          placeholder="your_username"
          maxlength="20"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="join-btn">Join Channel</button>
      </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="screen hidden">

      <div class="chat-header">
        <h2>general</h2>
        <span id="user-count">0 online</span>
      </div>

      <div id="messages" class="messages" aria-live="polite" aria-label="Messages"></div>

      <div class="input-area">
        <input
          type="text"
          id="message-input"
          placeholder="message #general"
          autocomplete="off"
          spellcheck="false"
          aria-label="Type a message"
        />
        <button id="send-btn" aria-label="Send message">Send</button>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
